<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SafeGuard — Medical Profile</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{font-family:system-ui,Segoe UI,Roboto,Arial;}

    body{margin:0;background:#f6f8fa;color:#111}

    /* NAVBAR (consistent with other pages) */
    .app-header{
      display:flex;align-items:center;gap:16px;padding:10px 14px;
      background:linear-gradient(90deg,#071029,#0b1220);color:#fff;
      box-shadow:0 2px 8px rgba(2,6,23,0.6);
    }
    .app-header .brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
    .app-header .brand img{width:28px;height:28px;border-radius:4px}
    .app-header .brand .title{font-weight:700;font-size:1.05rem}
    .navlinks{display:flex;gap:8px;align-items:center}
    .navlinks a{color:#dbeafe;text-decoration:none;padding:8px 10px;border-radius:6px;font-weight:600}
    .navlinks a:hover{background:rgba(255,255,255,0.04)}
    .navlinks a.active{background:#0b79ff;color:#fff;box-shadow:0 6px 18px rgba(11,121,255,0.12)}
    .right-controls{margin-left:auto}
    .nav-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#fff;padding:8px 10px;border-radius:6px;cursor:pointer}
    @media(max-width:820px){ .navlinks{display:none} }

    /* PAGE STYLES */
    main{max-width:940px;margin:20px auto;padding:12px}
    .card{
      background:#fff;padding:18px;border-radius:10px;
      box-shadow:0 8px 30px rgba(15,23,42,0.06);margin-bottom:18px;
    }
    label{display:block;font-weight:700;margin-top:10px}
    input[type="text"], input[type="number"], select, textarea {
      width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-top:6px;
      box-sizing:border-box;font-size:14px;
    }
    textarea { min-height:90px; resize:vertical; }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{padding:10px 14px;border-radius:8px;border:0;background:#0b79ff;color:#fff;font-weight:700;cursor:pointer;margin-top:14px}
    .muted{color:#666}
    #status{margin-top:10px;font-style:italic;color:#555}
    pre.output{background:#071029;color:#dbeafe;padding:12px;border-radius:8px;white-space:pre-wrap}
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="app-header">
    <div class="brand" id="brand">
      <img src="data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 24 24'>
        <path fill='%23ffffff' d='M12 2L2 7l10 5 10-5-10-5zm0 12l-10-5v8l10 5 10-5v-8l-10 5z'/>
      </svg>">
      <span class="title">SafeGuard</span>
    </div>

    <nav class="navlinks">
      <a href="index.html" data-nav="index">Dashboard</a>
      <a href="hotspots.html" data-nav="hotspots">Hotspots</a>
      <a href="risk.html" data-nav="risk">Risk</a>
      <a href="contacts.html" data-nav="contacts">Contacts</a>
      <a href="medical.html" data-nav="medical">Medical</a>
      <a href="sos.html" data-nav="sos">SOS</a>
    </nav>

    <div class="right-controls">
      <button id="open-map" class="nav-btn">Map</button>
    </div>
  </header>

  <main>
    <!-- Display area -->
    <div class="card" id="profile-display">
      <h2 style="margin:0 0 8px 0">Your Medical Profile</h2>
      <div id="profile-area">
        <div id="loading" class="muted">Loading medical profile…</div>
      </div>
    </div>

    <!-- Edit / Create form -->
    <div class="card">
      <h2 style="margin:0 0 8px 0">Edit / Create Medical Profile</h2>
      <div id="form-errors" style="color:#b91c1c"></div>

      <div class="grid">
        <div>
          <label for="full_name">Full Name</label>
          <input id="full_name" type="text" placeholder="Full name" />
        </div>
        <div>
          <label for="age">Age</label>
          <input id="age" type="number" min="0" placeholder="Age" />
        </div>
      </div>

      <div class="grid">
        <div>
          <label for="blood_group">Blood Group</label>
          <select id="blood_group">
            <option value="">Select</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
          </select>
        </div>
        <div>
          <label for="insurance">Insurance</label>
          <input id="insurance" type="text" placeholder="Insurance provider & policy number" />
        </div>
      </div>

      <label for="height">Height (cm)</label>
      <input id="height" type="number" step="0.1" placeholder="e.g. 165" />

      <label for="weight">Weight (kg)</label>
      <input id="weight" type="number" step="0.1" placeholder="e.g. 60" />

      <label for="allergies">Allergies</label>
      <textarea id="allergies" placeholder="e.g. Penicillin"></textarea>

      <label for="medications">Medications</label>
      <textarea id="medications" placeholder="Current medications"></textarea>

      <label for="conditions">Pre-existing Conditions</label>
      <textarea id="conditions" placeholder="e.g. Asthma, Diabetes"></textarea>

      <label for="emergency_notes">Emergency Notes</label>
      <textarea id="emergency_notes" placeholder="Important notes for responders"></textarea>

      <div style="display:flex;gap:12px;align-items:center;margin-top:10px">
        <button id="btn-save" class="btn">Save Profile</button>
        <div id="status">Status: idle</div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = 'http://127.0.0.1:5000';

    /* NAVBAR helper: highlight active link & map button */
    (function(){
      const path = location.pathname.split('/').pop() || 'medical.html';
      const mapping = {
        'index.html':'index','':'index','hotspots.html':'hotspots','risk.html':'risk',
        'contacts.html':'contacts','medical.html':'medical','sos.html':'sos'
      };
      const navKey = mapping[path.toLowerCase()] || 'medical';
      document.querySelectorAll('.navlinks a').forEach(a=>{
        try{ if(a.getAttribute('data-nav') === navKey) a.classList.add('active'); }catch(e){}
      });
      const mapBtn = document.getElementById('open-map');
      if(mapBtn) mapBtn.addEventListener('click', ()=> location.href='hotspots.html');
      const brand = document.getElementById('brand');
      if(brand) brand.addEventListener('click', ()=> { const nav = document.querySelector('.navlinks'); if(nav) nav.style.display = (getComputedStyle(nav).display === 'none') ? 'flex' : 'none'; });
    })();

    /* Utility */
    function setStatus(msg){ document.getElementById('status').textContent = 'Status: ' + msg; }
    function showError(msg){ document.getElementById('form-errors').textContent = msg; }
    function escapeHtml(s){ if(s === null || s === undefined) return ''; return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }

    /* Load profile */
    async function loadProfile(){
      setStatus('loading...');
      const area = document.getElementById('profile-area');
      area.innerHTML = '<div id="loading" class="muted">Loading medical profile…</div>';
      try{
        const res = await fetch(`${API_BASE}/api/medical`);
        if(res.status === 404){
          area.innerHTML = '<div class="muted">No medical profile found. Please fill the form below and save.</div>';
          setStatus('no profile');
          return;
        }
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        // Render summary
        const html = `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div><strong>Full name</strong><div class="muted">${escapeHtml(data.full_name)}</div></div>
            <div><strong>Age</strong><div class="muted">${data.age ?? ''}</div></div>
            <div><strong>Blood group</strong><div class="muted">${escapeHtml(data.blood_group)}</div></div>
            <div><strong>Insurance</strong><div class="muted">${escapeHtml(data.insurance)}</div></div>
          </div>
          <div style="margin-top:12px">
            <div><strong>Height</strong> <span class="muted">${data.height ?? ''} cm</span></div>
            <div><strong>Weight</strong> <span class="muted">${data.weight ?? ''} kg</span></div>
          </div>
          <div style="margin-top:12px">
            <div><strong>Allergies</strong><div class="muted">${escapeHtml(data.allergies)}</div></div>
            <div style="margin-top:8px"><strong>Medications</strong><div class="muted">${escapeHtml(data.medications)}</div></div>
            <div style="margin-top:8px"><strong>Conditions</strong><div class="muted">${escapeHtml(data.conditions)}</div></div>
            <div style="margin-top:8px"><strong>Emergency notes</strong><div class="muted">${escapeHtml(data.emergency_notes)}</div></div>
          </div>
        `;
        area.innerHTML = html;

        // Prefill form
        document.getElementById('full_name').value = data.full_name || '';
        document.getElementById('age').value = data.age ?? '';
        document.getElementById('blood_group').value = data.blood_group || '';
        document.getElementById('height').value = data.height ?? '';
        document.getElementById('weight').value = data.weight ?? '';
        document.getElementById('allergies').value = data.allergies || '';
        document.getElementById('medications').value = data.medications || '';
        document.getElementById('conditions').value = data.conditions || '';
        document.getElementById('emergency_notes').value = data.emergency_notes || '';
        document.getElementById('insurance').value = data.insurance || '';

        setStatus('profile loaded');
      }catch(err){
        area.innerHTML = '<div class="muted">Failed to load profile: ' + escapeHtml(err.message) + '</div>';
        setStatus('error');
        console.error(err);
      }
    }

    /* Save profile */
    document.getElementById('btn-save').addEventListener('click', async () => {
      showError('');
      setStatus('saving...');
      const payload = {
        full_name: document.getElementById('full_name').value.trim() || null,
        age: document.getElementById('age').value ? Number(document.getElementById('age').value) : null,
        blood_group: document.getElementById('blood_group').value || null,
        height: document.getElementById('height').value ? Number(document.getElementById('height').value) : null,
        weight: document.getElementById('weight').value ? Number(document.getElementById('weight').value) : null,
        allergies: document.getElementById('allergies').value.trim() || null,
        medications: document.getElementById('medications').value.trim() || null,
        conditions: document.getElementById('conditions').value.trim() || null,
        emergency_notes: document.getElementById('emergency_notes').value.trim() || null,
        insurance: document.getElementById('insurance').value.trim() || null
      };

      try{
        const res = await fetch(`${API_BASE}/api/medical`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });
        const json = await res.json().catch(()=>null);
        if(!res.ok){
          showError(json?.error || json?.message || 'Failed to save profile');
          setStatus('save failed');
          return;
        }
        setStatus('saved');
        await loadProfile();
      }catch(err){
        showError('Network error: ' + err.message);
        setStatus('error');
        console.error(err);
      }
    });

    // initial load
    loadProfile();
  </script>

</body>
</html>
